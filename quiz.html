<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Quiz</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 30px;
        }

        .question {
            margin-bottom: 20px;
        }

        .option {
            margin-left: 15px;
        }
    </style>
</head>

<body>

    <h2 id="judul"></h2>
    <div id="quiz"></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const bab = urlParams.get("bab");

        document.getElementById("judul").innerText = "Bab " + bab;

        const data = localStorage.getItem("quiz_bab_" + bab);

        if (!data) {
            document.body.innerHTML += "<h3>❌ Soal belum tersedia</h3>";
        } else {
            const questions = JSON.parse(data);
            renderSoal(questions);
        }

        function renderSoal(questions) {
            const container = document.getElementById("quiz");

            questions.forEach((q, i) => {
                const div = document.createElement("div");
                div.className = "question";

                div.innerHTML = `
      <p><strong>${i+1}. ${q.text}</strong></p>
      ${q.options.map((opt, idx) => `
        <div class="option">
          <label>
            <input type="radio" name="q${i}" value="${idx}">
            ${opt}
          </label>
        </div>
      `).join("")}
    `;

                container.appendChild(div);
            });
        }
    </script>

</body>

</html>
