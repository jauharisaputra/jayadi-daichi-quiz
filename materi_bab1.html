<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Materi Bab 1 - PRO</title>

    <style>
        :root {
            --primary: #2c5aa0;
            --bg: linear-gradient(135deg, #667eea, #764ba2);
        }

        body {
            margin: 0;
            font-family: 'Segoe UI';
            background: var(--bg);
            color: white;
            overflow: hidden;
        }

        /* SLIDE */
        .slide {
            display: none;
            height: 100vh;
            padding: 40px;
            text-align: center;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .slide.active {
            display: flex;
        }

        h1 {
            font-size: 2.5rem;
        }

        p {
            font-size: 1.2rem;
            max-width: 600px;
            cursor: pointer
        }

        /* BUTTON */
        .btn {
            margin-top: 20px;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        .speak-btn {
            background: #fff;
            color: #333;
        }

        /* NAV */
        .nav {
            position: fixed;
            bottom: 20px;
            width: 100%;
            text-align: center;
        }

        .nav button {
            padding: 10px 20px;
            margin: 5px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        /* PROGRESS */
        .progress {
            position: fixed;
            top: 0;
            left: 0;
            height: 6px;
            background: #fff;
            width: 0%;
            transition: 0.3s;
        }

        /* QUIZ */
        .quiz-btn {
            display: none;
            background: #e74c3c;
            color: white;
        }

        /* FULLSCREEN */
        .fullscreen {
            position: fixed;
            top: 10px;
            right: 10px;
            background: white;
            color: black;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="progress" id="progress"></div>
    <div class="fullscreen" onclick="openFullscreen()">⛶</div>

    <!-- SLIDE 1 -->
    <div class="slide active">
        <h1>📘 Bab 1</h1>
        <p>Perkenalan Bahasa Jepang</p>
        <button class="btn" onclick="nextSlide()">Mulai ▶️</button>
    </div>

    <!-- SLIDE 2 -->
    <div class="slide">
        <h1>わたしは〜です</h1>
        <p onclick="speakJP('わたしはがくせいです')">
            わたしは がくせいです 🔊
        </p>
        <button class="btn speak-btn" onclick="speakJP('わたしはがくせいです')">🔊 Dengar</button>
    </div>

    <!-- SLIDE 3 -->
    <div class="slide">
        <h1>Profesi</h1>

        <p onclick="speakJP('せんせい')">せんせい (Guru) 🔊</p>
        <p onclick="speakJP('がくせい')">がくせい (Siswa) 🔊</p>
        <p onclick="speakJP('いしゃ')">いしゃ (Dokter) 🔊</p>
    </div>

    <!-- SLIDE 4 -->
    <div class="slide">
        <h1>Partikel は</h1>
        <p onclick="speakJP('わたしはせんせいです')">
            わたしは せんせいです 🔊
        </p>
    </div>

    <!-- SLIDE 5 -->
    <div class="slide">
        <h1>Kalimat Negatif</h1>
        <p onclick="speakJP('がくせいじゃありません')">
            がくせいじゃありません 🔊
        </p>
    </div>

    <!-- SLIDE 6 -->
    <div class="slide">
        <h1>🎉 Selesai!</h1>
        <p>Materi selesai, lanjut ke kuis</p>

        <a href="bab1.html" class="btn quiz-btn" id="quizBtn">
            🚀 Mulai Kuis
        </a>
    </div>

    <!-- NAV -->
    <div class="nav">
        <button onclick="prevSlide()">⬅</button>
        <button onclick="nextSlide()">➡</button>
    </div>

    <script>
        let slides = document.querySelectorAll(".slide");
        let current = 0;

        /* =======================
           SLIDE CONTROL
        ======================= */
        function showSlide(i) {
            slides.forEach(s => s.classList.remove("active"));
            slides[i].classList.add("active");

            document.getElementById("progress").style.width =
                ((i + 1) / slides.length * 100) + "%";

            if (i === slides.length - 1) {
                document.getElementById("quizBtn").style.display = "inline-block";
            }
        }

        function nextSlide() {
            if (current < slides.length - 1) {
                current++;
                showSlide(current);
            }
        }

        function prevSlide() {
            if (current > 0) {
                current--;
                showSlide(current);
            }
        }

        /* =======================
           SWIPE HP
        ======================= */
        let startX = 0;

        document.addEventListener("touchstart", e => {
            startX = e.touches[0].clientX;
        });

        document.addEventListener("touchend", e => {
            let endX = e.changedTouches[0].clientX;

            if (startX - endX > 50) nextSlide();
            if (endX - startX > 50) prevSlide();
        });

        /* =======================
           FULLSCREEN
        ======================= */
        function openFullscreen() {
            let elem = document.documentElement;
            if (elem.requestFullscreen) elem.requestFullscreen();
        }

        /* =======================
           🔊 FIX AUDIO HP
        ======================= */

        let voicesReady = false;

        // trigger load voice saat user pertama klik
        document.body.addEventListener("click", () => {
            if (!voicesReady) {
                speechSynthesis.getVoices();
                voicesReady = true;
            }
        });

        function speakJP(text) {
            if (!window.speechSynthesis) {
                alert("Browser tidak support audio");
                return;
            }

            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = "ja-JP";

            let voices = speechSynthesis.getVoices();

            let jpVoice = voices.find(v => v.lang === "ja-JP") ||
                voices.find(v => v.lang.includes("ja")) ||
                voices[0];

            if (jpVoice) utter.voice = jpVoice;

            utter.rate = 0.9;
            utter.pitch = 1;

            speechSynthesis.cancel();

            setTimeout(() => {
                speechSynthesis.speak(utter);
            }, 100);
        }

        // fix iOS & Android voice loading
        speechSynthesis.onvoiceschanged = () => {};
    </script>

</body>

</html>
