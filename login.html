<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - Jayadi Daichi Quiz</title>

    <!-- Google Identity -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <style>
        :root {
            --primary: #2c5aa0;
            --primary-dark: #1e3d72;
            --success: #28a745;
            --accent: #ffc107;
            --bg: linear-gradient(135deg, #667eea 0%, #764ba2 100%);

        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }

        .login-container {
            text-align: center;
            color: white;
        }

        .title {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 10px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .subtitle {
            margin-bottom: 30px;

        }

        .login-card {
            background: var(--card-bg);
            padding: 40px 30px;
            border-radius: 25px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(15px);

        .logo {
            font-size: 50px;
            margin-bottom: 10px;

        .login-card h2 {

            color: #666;

        select {

            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(44, 90, 160, 0.2);

            display: flex;
            justify-content: center;
        }

            margin-top: 20px;

        }

            color: white;

                opacity: 0;

<body>

    <div class="login-container">
        <div class="title">Jayadi Daichi Quiz</div>
        <div class="subtitle">JLPT N5 & N4 Learning Platform</div>

        <div class="login-card">
            <div class="logo">🎓</div>
            <h2>Login Siswa</h2>
            <p>Masuk untuk mulai belajar</p>

            <!-- Pilih Kelas -->
            <select id="kelas">
                <option value="">Pilih Kelas</option>
                <option>Goshogawara</option>
                <option>Suginami</option>
                <option>Shibuya</option>
                <option>Akihabara</option>
            </select>

            <!-- Google Login -->
            <div id="g_id_onload"
                data-client_id="427555562472-ptt0e991t8tvd3ueh04go4echgarad24.apps.googleusercontent.com"
                data-callback="handleCredentialResponse">
            </div>

            <div class="g_id_signin" data-type="standard" data-size="large" data-theme="filled_blue" data-shape="pill">
            </div>
        </div>

        <div class="footer">
            © 2026 <strong>Jayadi Global Education Center</strong>
        </div>
    </div>

    <script>
        // auto redirect kalau sudah login
        if (localStorage.getItem("login") === "true") {
            window.location.href = "index1.html";
        }

        function handleCredentialResponse(response) {
            const data = parseJwt(response.credential);
            const kelas = document.getElementById("kelas").value;

            if (!kelas) {
                alert("Pilih kelas dulu!");
                return;
            }

            const user = {
                nama: data.name,
                email: data.email,
                kelas: kelas
            };

            localStorage.setItem("login", "true");
            localStorage.setItem("user", JSON.stringify(user));

            fetch("https://script.google.com/macros/s/AKfycbwJWNGhkWCae4VaOh6PSftN9z5MrD1dMq_P1SrmNIQhbt73Dji0at5rwIstFcIjKThX/exec", {
                    method: "POST",
                    body: JSON.stringify(user)
                })
                .then(() => {
                    window.location.href = "index1.html";
                })
                .catch(() => {
                    alert("Gagal kirim data!");
                });
        }

        function parseJwt(token) {
            const base64Url = token.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            const jsonPayload = decodeURIComponent(atob(base64).split('').map(function (c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));

            return JSON.parse(jsonPayload);
        }
    </script>

</body>

</html>
