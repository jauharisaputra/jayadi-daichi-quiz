<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rapor N4 - Input</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body {
            font-family: "Times New Roman", serif;
            background: #eee
        }

        .wrapper {
            display: flex;
            gap: 20px;
            align-items: flex-start
        }

        .form {
            width: 300px;
            background: #fff;
            padding: 15px;
            border: 1px solid #ccc
        }

        .form input,
        .form textarea {
            width: 100%;
            margin-bottom: 8px;
            padding: 5px
        }

        .page {
            width: 794px;
            min-height: 1123px;
            background: #fff;
            padding: 40px 50px
        }

        .center {
            text-align: center
        }

        .header-title {
            font-size: 20px;
            font-weight: bold
        }

        .sub {
            font-size: 12px
        }

        .title {
            font-size: 16px;
            font-weight: bold;
            margin-top: 10px;
            text-decoration: underline
        }

        .info {
            margin-top: 20px;
            font-size: 14px
        }

        .section {
            margin-top: 15px
        }

        .section-title {
            background: #ddd;
            border: 1px solid #000;
            padding: 4px;
            font-weight: bold
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px
        }

        td,
        th {
            border: 1px solid #000;
            padding: 5px
        }

        .right {
            text-align: right
        }

        .bold {
            font-weight: bold
        }

        .note {
            border: 1px solid #000;
            padding: 8px;
            margin-top: 5px
        }

        .sign {
            display: flex;
            justify-content: space-between;
            margin-top: 60px;
            text-align: center
        }

        button {
            margin-top: 10px;
            padding: 8px
        }
    </style>
</head>

<body>

    <div class="wrapper">

        <div class="form">
            <h3>Input Data</h3>
            <input id="nama" placeholder="Nama">
            <input id="nis" placeholder="NIS">
            <input id="tanggal" placeholder="Tanggal (18/03/2026)">
            <input id="kelas" placeholder="Kelas">

            <h4>Sikap</h4>
            <input id="kehadiran" placeholder="Kehadiran">
            <input id="keaktifan" placeholder="Keaktifan">

            <h4>Tugas</h4>
            <input id="tugas" placeholder="Nilai Tugas">

            <h4>Kompetensi</h4>
            <input id="bunpou" placeholder="Bunpou">
            <input id="kanji" placeholder="Kanji">
            <input id="dokkai" placeholder="Dokkai">
            <input id="choukai" placeholder="Choukai">
            <input id="kaiwa" placeholder="Kaiwa">

            <textarea id="catatan" placeholder="Catatan Sensei"></textarea>

            <button onclick="generate()">Generate</button>
            <button onclick="downloadPDF()">Download PDF</button>
        </div>

        <div id="rapor" class="page"></div>

    </div>

    <script>
        function val(id) {
            return document.getElementById(id).value
        }

        function generate() {
            let data = {
                nama: val('nama'),
                nis: val('nis'),
                tanggal: val('tanggal'),
                kelas: val('kelas'),
                kehadiran: +val('kehadiran'),
                keaktifan: +val('keaktifan'),
                tugas: +val('tugas'),
                bunpou: +val('bunpou'),
                kanji: +val('kanji'),
                dokkai: +val('dokkai'),
                choukai: +val('choukai'),
                kaiwa: +val('kaiwa'),
                catatan: val('catatan')
            };

            let sikap = Math.round((data.kehadiran + data.keaktifan) / 2);
            let kompetensi = Math.round((data.bunpou + data.kanji + data.dokkai + data.choukai + data.kaiwa) / 5);
            let total = Math.round(sikap * 0.3 + data.tugas * 0.3 + kompetensi * 0.4);

            let status = total >= 70 ?
                "<b>LULUS</b> / <s>TIDAK LULUS</s>" :
                "<s>LULUS</s> / <b>TIDAK LULUS</b>";

            let html = `
<div class="center">
<div class="header-title">JAYADI GLOBAL</div>
<div class="header-title">EDUCATION CENTER</div>
<div class="sub">Ruko Gunung Sahari Center Blok B8 Jl. Industri Raya I, Jakarta Pusat</div>
<div class="title">NILAI HASIL BELAJAR SISWA KELAS N4</div>
</div>

<div class="info">
<div>Nama Siswa : ${data.nama}</div>
<div>NIS : ${data.nis}</div>
<div>Tanggal : ${data.tanggal}</div>
<div>Kelas : ${data.kelas}</div>
</div>

<div class="section">
<div class="section-title">A. Penilaian Sikap</div>
<table>
<tr><th>Kriteria</th><th>Nilai (0 - 100)</th></tr>
<tr><td>Kehadiran</td><td class="right">${data.kehadiran}</td></tr>
<tr><td>Keaktifan</td><td class="right">${data.keaktifan}</td></tr>
</table>
</div>

<div class="section">
<div class="section-title">B. Penilaian Tugas</div>
<table>
<tr><th>Kategori</th><th>Nilai (0 - 100)</th></tr>
<tr><td>Keseluruhan Tugas</td><td class="right">${data.tugas}</td></tr>
</table>
</div>

<div class="section">
<div class="section-title">C. Penilaian Kompetensi/TO</div>
<table>
<tr><th>Kategori</th><th>Nilai (0 - 100)</th></tr>
<tr><td>Bunpou</td><td class="right">${data.bunpou}</td></tr>
<tr><td>Kanji</td><td class="right">${data.kanji}</td></tr>
<tr><td>Dokkai</td><td class="right">${data.dokkai}</td></tr>
<tr><td>Choukai</td><td class="right">${data.choukai}</td></tr>
<tr><td>Kaiwa</td><td class="right">${data.kaiwa}</td></tr>
</table>
</div>

<div class="section">
<div class="section-title">D. Kesimpulan Nilai Akhir</div>
<table>
<tr><th>Komponen</th><th>Presentase</th><th>Nilai Rata-rata</th></tr>
<tr><td>Sikap</td><td>30 %</td><td class="right">${sikap}</td></tr>
<tr><td>Tugas</td><td>30 %</td><td class="right">${data.tugas}</td></tr>
<tr><td>Kompetensi/TO</td><td>40 %</td><td class="right">${kompetensi}</td></tr>
<tr class="bold"><td>Total Nilai</td><td>100 %</td><td class="right">${total}</td></tr>
</table>
</div>

<div class="section">
<div class="section-title">E. Catatan Sensei :</div>
<div class="note">${data.catatan}</div>
</div>

<div style="margin-top:20px">
Berdasarkan hasil penilaian yang diperoleh oleh siswa di kelas ini, siswa dinyatakan:
<div style="margin-top:5px">${status}</div>
<div style="margin-top:20px">Jakarta, 2 April 2026</div>
</div>

<div class="sign">
<div>(Izzatur Rahman Ardanian Zhafran)<br>Sensei Utama</div>
<div>(Desie Triaryani)<br>Kepala Sekolah</div>
<div>(Jauhari Saputra)<br>Sensei Pendamping</div>
</div>
`;

            document.getElementById('rapor').innerHTML = html;
        }

        function downloadPDF() {
            let element = document.getElementById('rapor');
            html2pdf().set({
                margin: 0,
                filename: 'rapor.pdf',
                html2canvas: {
                    scale: 2
                },
                jsPDF: {
                    unit: 'mm',
                    format: 'a4'
                }
            }).from(element).save();
        }
    </script>

</body>

</html>
