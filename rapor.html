<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rapor N4 - FINAL PRINT FIX</title>

    <!-- FONT JEPANG -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: "Noto Serif JP", serif;
            background: #eee;
            line-height: 1.2;
        }

        .wrapper {
            display: flex;
            gap: 20px;
        }

        .form {
            width: 300px;
            background: #fff;
            padding: 15px;
            border: 1px solid #ccc;
        }

        .form input,
        .form textarea {
            width: 100%;
            margin-bottom: 8px;
            padding: 5px;
        }

        /* ===== A4 FIX ===== */
        .page {
            width: 210mm;
            min-height: 297mm;
            padding: 15mm;
            background: #fff;
            box-sizing: border-box;
        }

        /* ===== TEXT ===== */
        .header-title {
            text-align: center;
            font-size: 16px;
            font-weight: bold;
        }

        .sub {
            text-align: center;
            font-size: 11px;
        }

        .title {
            text-align: center;
            font-size: 14px;
            font-weight: bold;
            text-decoration: underline;
            margin-top: 5px;
        }

        .info {
            margin-top: 10px;
            font-size: 12px;
        }

        .section {
            margin-top: 10px;
        }

        .section-title {
            background: #ddd;
            border: 1px solid #000;
            padding: 3px;
            font-weight: bold;
            font-size: 12px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        td,
        th {
            border: 1px solid #000;
            padding: 4px;
        }

        .right {
            text-align: right;
        }

        .note {
            border: 1px solid #000;
            padding: 6px;
            margin-top: 5px;
        }

        .sign {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            text-align: center;
        }

        .logo {
            position: absolute;
            left: 15mm;
            top: 15mm;
            width: 30mm;
        }

        /* ===== PRINT MODE ===== */
        @media print {

            body {
                background: none;
            }

            .form {
                display: none;
            }

            .wrapper {
                display: block;
            }

            .page {
                margin: 0;
                box-shadow: none;
            }
        }
    </style>
</head>

<body>

    <div class="wrapper">

        <div class="form">
            <h3>Input Data</h3>

            <input id="nama" placeholder="Nama">
            <input id="nis" placeholder="NIS">
            <input id="tanggal" placeholder="Tanggal">
            <input id="kelas" placeholder="Kelas">

            <h4>Sikap</h4>
            <input id="kehadiran" placeholder="Kehadiran">
            <input id="keaktifan" placeholder="Keaktifan">

            <h4>Tugas</h4>
            <input id="tugas" placeholder="Nilai Tugas">

            <h4>Kompetensi</h4>
            <input id="bunpou" placeholder="Bunpou">
            <input id="kanji" placeholder="Kanji">
            <input id="dokkai" placeholder="Dokkai">
            <input id="choukai" placeholder="Choukai">
            <input id="kaiwa" placeholder="Kaiwa">

            <textarea id="catatan" placeholder="Catatan Sensei"></textarea>

            <button onclick="generate()">Generate</button>
            <button onclick="downloadPDF()">Download PDF</button>
        </div>

        <div id="rapor" class="page"></div>

    </div>

    <script>
        function val(id) {
            return document.getElementById(id).value
        }

        function generate() {

            let data = {
                nama: val('nama'),
                nis: val('nis'),
                tanggal: val('tanggal'),
                kelas: val('kelas'),
                kehadiran: +val('kehadiran'),
                keaktifan: +val('keaktifan'),
                tugas: +val('tugas'),
                bunpou: +val('bunpou'),
                kanji: +val('kanji'),
                dokkai: +val('dokkai'),
                choukai: +val('choukai'),
                kaiwa: +val('kaiwa'),
                catatan: val('catatan')
            };

            let sikap = Math.round((data.kehadiran + data.keaktifan) / 2);
            let kompetensi = Math.round((data.bunpou + data.kanji + data.dokkai + data.choukai + data.kaiwa) / 5);
            let total = Math.round(sikap * 0.3 + data.tugas * 0.3 + kompetensi * 0.4);

            let statusHTML = total >= 70 ?
                "<b>LULUS</b> / <s>TIDAK LULUS</s>" :
                "<s>LULUS</s> / <b>TIDAK LULUS</b>";

            document.getElementById('rapor').innerHTML = `
<img src="logo/logo_jgec.jpg" class="logo">

<div class="header-title">JAYADI GLOBAL</div>
<div class="header-title">EDUCATION CENTER</div>
<div class="sub">Jakarta Pusat</div>
<div class="title">NILAI HASIL BELAJAR SISWA KELAS N4</div>

<div class="info">
<div>Nama : ${data.nama}</div>
<div>NIS : ${data.nis}</div>
<div>Tanggal : ${data.tanggal}</div>
<div>Kelas : ${data.kelas}</div>
</div>

<div class="section">
<div class="section-title">A. Sikap</div>
<table>
<tr><td>Kehadiran</td><td class="right">${data.kehadiran}</td></tr>
<tr><td>Keaktifan</td><td class="right">${data.keaktifan}</td></tr>
</table>
</div>

<div class="section">
<div class="section-title">B. Tugas</div>
<table>
<tr><td>Total</td><td class="right">${data.tugas}</td></tr>
</table>
</div>

<div class="section">
<div class="section-title">C. Kompetensi</div>
<table>
<tr><td>Bunpou 文法</td><td class="right">${data.bunpou}</td></tr>
<tr><td>Kanji 漢字</td><td class="right">${data.kanji}</td></tr>
<tr><td>Dokkai 読解</td><td class="right">${data.dokkai}</td></tr>
<tr><td>Choukai 聴解</td><td class="right">${data.choukai}</td></tr>
<tr><td>Kaiwa 会話</td><td class="right">${data.kaiwa}</td></tr>
</table>
</div>

<div class="section">
<div class="section-title">D. Total</div>
<table>
<tr><td>Sikap</td><td>${sikap}</td></tr>
<tr><td>Tugas</td><td>${data.tugas}</td></tr>
<tr><td>Kompetensi</td><td>${kompetensi}</td></tr>
<tr><td><b>Total</b></td><td>${total}</td></tr>
</table>
</div>

<div class="section">
<div class="section-title">Catatan</div>
<div class="note">${data.catatan}</div>
</div>

<div style="margin-top:10px">
Status: ${statusHTML}
</div>

<div class="sign">
<div>
<img src="logo/img15.jpg" style="height:40px"><br>
Sensei Utama
</div>

<div style="position:relative">
<img src="logo/ttd_desy.jpg" style="height:40px">
<img src="logo/logo_jgec.jpg" style="position:absolute;left:50%;top:0;transform:translateX(-50%);height:35px;opacity:0.7">
<br>Kepala Sekolah
</div>

<div>
<img src="logo/ttd_jauhari.jpg" style="height:40px"><br>
Pendamping
</div>
</div>
`;
        }

        /* ===== DOWNLOAD PDF (PRINT) ===== */
        function downloadPDF() {
            window.print();
        }
    </script>

</body>

</html>
