<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Sertifikat</title>
    <style>
        body {
            font-family: Georgia;
            background: #eee;
            text-align: center;
            padding: 30px;
        }

        #sertifikat {
            width: 800px;
            margin: auto;
            background: white;
            padding: 40px;
            border: 10px solid gold;
        }

        h1 {
            font-size: 40px;
        }

        .nama {
            font-size: 30px;
            margin: 20px 0;
        }

        .nilai {
            font-size: 25px;
        }
    </style>
</head>

<body>

    <h2>🎓 Sertifikat Kelulusan</h2>

    <div id="sertifikat">
        <h1>SERTIFIKAT</h1>
        <p>Diberikan kepada:</p>

        <div class="nama" id="nama"></div>

        <p>Atas pencapaian nilai:</p>

        <div class="nilai" id="nilai"></div>

        <p>Dalam Ujian JLPT N5/N4</p>

        <br><br>
        <p>Sensei</p>
        <b>Jauhari Saputra</b>
    </div>

    <br>
    <button onclick="window.print()">🖨️ Print / Save PDF</button>

    <script>
        let siswa = JSON.parse(localStorage.getItem("lastSiswa")) || {
            nama: "Nama Siswa",
            nilai: 0
        };

        document.getElementById("nama").innerText = siswa.nama;
        document.getElementById("nilai").innerText = siswa.nilai;
    </script>

</body>

</html>
