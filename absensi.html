<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi Bulanan</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #2c5aa0, #6ea8fe);
            padding: 20px;
        }

        .container {
            max-width: 1100px;
            margin: auto;
            background: #fff;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        h2,
        h3 {
            text-align: center;
        }

        input,
        select,
        button {
            width: 100%;
            padding: 10px;
            margin: 6px 0;
            border-radius: 8px;
        }

        button {
            background: #2c5aa0;
            color: #fff;
            border: none;
            cursor: pointer;
        }

        .btn-red {
            background: #dc3545;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th {
            background: #2c5aa0;
            color: #fff;
        }

        td,
        th {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }

        .success {
            color: green;
            font-weight: bold;
        }

        .danger {
            color: red;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="container">

        <h2>📊 Absensi Bulanan</h2>

        <input type="month" id="periode" onchange="render()">

        <select id="siswa"></select>
        <button onclick="tambahSiswaBaru()">+ Tambah Siswa</button>

        <select id="status">
            <option value="Hadir">Hadir (O)</option>
            <option value="Izin">Izin</option>
            <option value="Sakit">Sakit</option>
            <option value="Alpha">Alpha (X)</option>
        </select>

        <button id="btnAbsen" onclick="absen()">✔ Absen</button>
        <button onclick="exportExcel()">⬇ Export</button>
        <button class="btn-red" onclick="clearData()">🗑 Clear</button>

        <h3>📅 Data Harian</h3>
        <table>
            <thead>
                <tr>
                    <th>Tanggal</th>
                    <th>Nama</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="tabel"></tbody>
        </table>

        <h3>📈 Rekap Bulanan (<span id="judul"></span>)</h3>
        <table>
            <thead>
                <tr>
                    <th>Nama</th>
                    <th>Hadir</th>
                    <th>Izin</th>
                    <th>Sakit</th>
                    <th>Alpha</th>
                    <th>Nilai</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="rekap"></tbody>
        </table>


        <!-- Tombol memunculkan popup, bisa ditaruh di atas atau bawah button absen -->
        <button onclick="showPopupAlpha()">📩 Daftar Siswa Alpha</button>
    </div>

    <script>
        const SHEET_URL =
            "https://script.google.com/macros/s/AKfycbz0vBM6EWB6j3v7a7Bz6X-QhdIjlaA3rZYinRWAyl7lD1tSU07ARk8xILz7bAKS5OTqiA/exec";

        let siswa = [{
                nama: "Andika",
                wa: "62822021922084"
            },
            {
                nama: "Aulia Naufal Ardana",
                wa: "6281292256104"
            },
            {
                nama: "Chairul Achmad Zacky",
                wa: "6282001995779"
            },
            {
                nama: "David Matius Augustino Kolanus",
                wa: "6289694869140"
            },
            {
                nama: "Freisye Adetya Mandala",
                wa: "6285340432339"
            },
            {
                nama: "Radwan",
                wa: "6289689573238"
            },
            {
                nama: "Septian Widiya Kusuma Ramadani",
                wa: "6287761570244"
            },
            {
                nama: "Sola Gratia Agafiana",
                wa: "6285704288016"
            },
            {
                nama: "Indra Jhonatan Situmorang",
                wa: "6283135082919"
            },
            {
                nama: "Liau Cia Cia",
                wa: "6281349832802"
            },
            {
                nama: "Dyko Satmoko (Marlon)",
                wa: "6281264561823"
            },
            {
                nama: "Rani Basri Tinulu Rante Talla",
                wa: "6285696057450"
            },
            {
                nama: "Hegel Al Hanan",
                wa: "6281384665535"
            },
            {
                nama: "Ferdi Muchtadin",
                wa: "6281292793987"
            },
            {
                nama: "Mikael Adi Setiawan Hutabarat",
                wa: "6281519428961"
            },
            {
                nama: "Mustia",
                wa: "6285289038883"
            }
        ];

        let absensi = JSON.parse(localStorage.getItem('absensi')) || [];
        // Tampilkan popup daftar siswa alpha
        function showPopupAlpha() {
            const periode = getPeriode();
            const alphaSiswa = absensi.filter(a => a.status === "X" && a.periode === periode);
            const listEl = document.getElementById('listAlpha');
            listEl.innerHTML = "";

            if (alphaSiswa.length === 0) {
                alert("Tidak ada siswa Alpha di periode ini.");
                return;
            }

            alphaSiswa.forEach(a => {
                const s = siswa.find(s => s.nama === a.nama);
                listEl.innerHTML += `<li>${s.nama} (WA: ${s.wa})</li>`;
            });

            document.getElementById('popupAlpha').style.display = "flex";
        }

        // Tutup popup
        function popupAlphaClose() {
            document.getElementById('popupAlpha').style.display = "none";
        }

        // Kirim WA gabungan ke satu nomor guru
        function kirimWAAlphaGabungan() {
            const periode = getPeriode();
            const alphaSiswa = absensi.filter(a => a.status === "X" && a.periode === periode);

            if (alphaSiswa.length === 0) return;

            let pesan = `Siswa Alpha bulan ${periode}:\n`;
            alphaSiswa.forEach((a, idx) => {
                pesan += `${idx + 1}. ${a.nama}\n`;
            });

            // Ganti nomor guru dengan WA tujuan
            const guruWA = "6285159296337"; // masukkan nomor WA guru (628...)
            window.open(`https://wa.me/${guruWA}?text=${encodeURIComponent(pesan)}`, "_blank");

            alert("💬 Link WA gabungan sudah dibuka.");
            popupAlphaClose();
        }

        function renderSiswa() {
            let el = document.getElementById('siswa');
            el.innerHTML = '';
            siswa.forEach((s, i) => {
                el.innerHTML += `<option value="${i}">${s.nama}</option>`;
            });
        }

        function today() {
            return new Date().toISOString().split('T')[0];
        }

        function getPeriode() {
            return document.getElementById('periode').value;
        }

        async function absen() {
            const btn = document.getElementById("btnAbsen");
            btn.disabled = true;

            const idx = document.getElementById('siswa').value;
            const status = document.getElementById('status').value;
            const periode = getPeriode();

            if (!periode) {
                alert("Pilih bulan dulu!");
                btn.disabled = false;
                return;
            }

            const s = siswa[idx];
            let simbol = status === "Hadir" ? "O" : (status === "Alpha" ? "X" : status);

            const data = {
                nama: s.nama,
                status: simbol,
                periode: periode
            };

            absensi.push({
                tanggal: today(),
                ...data
            });
            localStorage.setItem('absensi', JSON.stringify(absensi));

            try {
                await fetch(SHEET_URL, {
                    method: "POST",
                    mode: "no-cors",
                    headers: {
                        "Content-Type": "application/x-www-form-urlencoded"
                    },
                    body: new URLSearchParams(data)
                });

                alert("✅ Data terkirim ke Google Sheet");

            } catch (err) {
                console.error(err);
                alert("❌ Gagal kirim");
            }

            // if (simbol === "X") {
            //     let pesan = `Siswa ${s.nama} tidak hadir. Mohon alasan.`;
            //     window.open(`https://wa.me/${s.wa}?text=${encodeURIComponent(pesan)}`);
            // }

            btn.disabled = false;
            render();
        }

        function render() {
            let periode = getPeriode();
            document.getElementById('judul').innerText = periode || "-";

            let tb = document.getElementById('tabel');
            tb.innerHTML = "";

            absensi.filter(a => a.periode === periode).forEach(a => {
                tb.innerHTML += `
        <tr>
        <td>${a.tanggal}</td>
        <td>${a.nama}</td>
        <td class="${a.status==='X'?'danger':'success'}">${a.status}</td>
        </tr>`;
            });

            let rk = document.getElementById('rekap');
            rk.innerHTML = "";

            siswa.forEach(s => {
                let data = absensi.filter(a => a.nama === s.nama && a.periode === periode);

                let hadir = data.filter(d => d.status === "O").length;
                let izin = data.filter(d => d.status === "Izin").length;
                let sakit = data.filter(d => d.status === "Sakit").length;
                let alpha = data.filter(d => d.status === "X").length;

                let total = hadir + izin + sakit + alpha;
                let nilai = total ? Math.round(hadir / total * 100) : 0;
                let ket = alpha > 4 ? "TIDAK LULUS" : "LULUS";

                rk.innerHTML += `
        <tr>
        <td>${s.nama}</td>
        <td class="success">${hadir}</td>
        <td>${izin}</td>
        <td>${sakit}</td>
        <td class="danger">${alpha}</td>
        <td><b>${nilai}</b></td>
        <td class="${ket==='TIDAK LULUS'?'danger':'success'}">${ket}</td>
        </tr>`;
            });
        }

        function tambahSiswaBaru() {
            let nama = prompt("Nama");
            let wa = prompt("WA (628xxx)");
            if (!nama || !wa) return;
            siswa.push({
                nama,
                wa
            });
            renderSiswa();
        }

        function clearData() {
            if (confirm("Hapus semua data?")) {
                localStorage.removeItem('absensi');
                absensi = [];
                render();
            }
        }

        function exportExcel() {
            let periode = getPeriode();
            let csv = "Nama,Hadir,Izin,Sakit,Alpha,Nilai,Status\n";

            siswa.forEach(s => {
                let data = absensi.filter(a => a.nama === s.nama && a.periode === periode);

                let hadir = data.filter(d => d.status === "O").length;
                let izin = data.filter(d => d.status === "Izin").length;
                let sakit = data.filter(d => d.status === "Sakit").length;
                let alpha = data.filter(d => d.status === "X").length;

                let total = hadir + izin + sakit + alpha;
                let nilai = total ? Math.round(hadir / total * 100) : 0;
                let ket = alpha > 4 ? "TIDAK LULUS" : "LULUS";

                csv += `${s.nama},${hadir},${izin},${sakit},${alpha},${nilai},${ket}\n`;
            });

            let blob = new Blob([csv]);
            let a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `rekap-${periode}.csv`;
            a.click();
        }

        renderSiswa();
        render();
    </script>
    <!-- Popup daftar Alpha -->
    <div id="popupAlpha" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; 
    background:rgba(0,0,0,0.5); justify-content:center; align-items:center;">
        <div style="background:#fff; padding:20px; border-radius:10px; width:400px; max-width:90%;">
            <h3>📩 Siswa Alpha</h3>
            <ul id="listAlpha" style="text-align:left; max-height:200px; overflow:auto; padding-left:20px;"></ul>
            <button onclick="kirimWAAlphaGabungan()">Kirim WA Sekaligus</button>
            <button style="margin-left:10px;" onclick="popupAlphaClose()">Tutup</button>
        </div>
    </div>
</body>

</html>
