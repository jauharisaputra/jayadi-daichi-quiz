<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rapor N4 - Latex Style</title>

    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

    <style>
        body {
            font-family: "Noto Serif JP", serif;
            background: #eee;
        }

        .wrapper {
            display: flex;
            gap: 20px;
        }

        .form {
            width: 300px;
            background: #fff;
            padding: 15px;
            border: 1px solid #ccc;
        }

        .page {
            width: 210mm;
            min-height: 297mm;
            background: #fff;
            padding: 20mm;
        }

        /* HEADER */
        .header {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header img {
            height: 40px;
        }

        .header-text {
            font-weight: bold;
            font-size: 16px;
        }

        /* INFO TABLE */
        .info-table {
            width: 100%;
            margin-top: 10px;
            font-size: 12px;
        }

        .info-table td {
            padding: 3px;
        }

        /* SECTION */
        .section-title {
            font-weight: bold;
            margin-top: 15px;
        }

        /* TABLE LATEX STYLE */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 5px;
            font-size: 12px;
        }

        td,
        th {
            border: 1px solid black;
            padding: 5px;
        }

        .center {
            text-align: center;
        }

        /* FOOTER */
        .sign {
            margin-top: 40px;
            display: flex;
            justify-content: space-between;
            text-align: center;
        }

        @media print {
            .form {
                display: none;
            }

            body {
                background: none;
            }
        }
    </style>
</head>

<body>

    <div class="wrapper">

        <div class="form">
            <h3>Import Excel</h3>
            <input type="file" id="excelFile">
            <button onclick="importExcel()">Load</button>

            <select id="siswaSelect" onchange="generate()"></select>

            <br><br>
            <button onclick="generate()">Generate</button>
            <button onclick="window.print()">Print PDF</button>
        </div>

        <div id="rapor" class="page"></div>

    </div>

    <script>
        let dataSiswa = [];

        function num(v) {
            let n = parseInt(v);
            return isNaN(n) ? 0 : n;
        }

        function importExcel() {
            let file = document.getElementById('excelFile').files[0];
            let reader = new FileReader();

            reader.onload = function (e) {
                let data = new Uint8Array(e.target.result);
                let wb = XLSX.read(data, {
                    type: 'array'
                });
                let sheet = wb.Sheets[wb.SheetNames[0]];

                dataSiswa = XLSX.utils.sheet_to_json(sheet);

                let select = document.getElementById('siswaSelect');
                select.innerHTML = "";

                dataSiswa.forEach((s, i) => {
                    let opt = document.createElement('option');
                    opt.value = i;
                    opt.text = s.nama;
                    select.appendChild(opt);
                });
            }

            reader.readAsArrayBuffer(file);
        }

        function generate() {

            let d = dataSiswa[document.getElementById('siswaSelect').value];

            let sikap = Math.round((num(d.kehadiran) + num(d.keaktifan)) / 2);
            let kompetensi = Math.round((num(d.bunpou) + num(d.kanji) + num(d.dokkai) + num(d.choukai) + num(d.kaiwa)) /
                5);
            let total = Math.round(sikap * 0.3 + num(d.tugas) * 0.3 + kompetensi * 0.4);

            let status = total >= 70 ? "LULUS" : "TIDAK LULUS";

            document.getElementById('rapor').innerHTML = `

<!-- HEADER -->
<div class="header">
    <img src="logo/logo_jgec.jpg">
    <div class="header-text">
        JAYADI GLOBAL<br>EDUCATION CENTER
    </div>
</div>

<div style="font-size:12px;margin-top:5px">
Ruko Gunung Sahari Center Blok B8<br>
Jl. Industri Raya I, Jakarta Pusat<br>
Telp. 021 – 6009666
</div>

<div style="text-align:center;font-weight:bold;margin-top:10px;text-decoration:underline">
NILAI HASIL BELAJAR SISWA KELAS N4
</div>

<!-- INFO -->
<table class="info-table">
<tr><td>Nama</td><td>: ${d.nama}</td></tr>
<tr><td>NIS</td><td>: ${d.nis}</td></tr>
<tr><td>Tanggal</td><td>: ${d.tanggal}</td></tr>
<tr><td>Kelas</td><td>: ${d.kelas}</td></tr>
</table>

<!-- A -->
<div class="section-title">A. Penilaian Sikap</div>
<table>
<tr><th>Kriteria</th><th>Nilai</th></tr>
<tr><td>Kehadiran</td><td class="center">${num(d.kehadiran)}</td></tr>
<tr><td>Keaktifan</td><td class="center">${num(d.keaktifan)}</td></tr>
</table>

<!-- B -->
<div class="section-title">B. Penilaian Tugas</div>
<table>
<tr><th>Kategori</th><th>Nilai</th></tr>
<tr><td>Keseluruhan Tugas</td><td class="center">${num(d.tugas)}</td></tr>
</table>

<!-- C -->
<div class="section-title">C. Penilaian Kompetensi/TO</div>
<table>
<tr><th>Kategori</th><th>Nilai</th></tr>
<tr><td>Bunpou 文法</td><td>${num(d.bunpou)}</td></tr>
<tr><td>Kanji 漢字</td><td>${num(d.kanji)}</td></tr>
<tr><td>Dokkai 読解</td><td>${num(d.dokkai)}</td></tr>
<tr><td>Choukai 聴解</td><td>${num(d.choukai)}</td></tr>
<tr><td>Kaiwa 会話</td><td>${num(d.kaiwa)}</td></tr>
</table>

<!-- D -->
<div class="section-title">D. Kesimpulan Nilai Akhir</div>
<table>
<tr><th>Komponen</th><th>Presentase</th><th>Nilai</th></tr>
<tr><td>Sikap</td><td>30%</td><td>${sikap}</td></tr>
<tr><td>Tugas</td><td>30%</td><td>${num(d.tugas)}</td></tr>
<tr><td>Kompetensi</td><td>40%</td><td>${kompetensi}</td></tr>
<tr><td><b>Total</b></td><td>100%</td><td><b>${total}</b></td></tr>
</table>

<!-- CATATAN -->
<div class="section-title">E. Catatan Sensei</div>
<div style="border:1px solid black;padding:10px">${d.catatan || ''}</div>

<!-- STATUS -->
<div style="margin-top:10px">
Berdasarkan hasil penilaian:<br>
<b>${status}</b>
</div>

<!-- TTD -->
<div class="sign">
<div>
<img src="logo/img15.jpg" height="40"><br>
Sensei Utama
</div>

<div>
<img src="logo/ttd_desy.jpg" height="40"><br>
Kepala Sekolah
</div>

<div>
<img src="logo/ttd_jauhari.jpg" height="40"><br>
Pendamping
</div>
</div>

`;
        }
    </script>

</body>

</html>
